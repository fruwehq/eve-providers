api_version: eve.plugin/v1
kind: provider
id: aws
display_name: AWS EC2
commands:
  resolve: {exec: commands/provider-command, args: [resolve]}
  init: {exec: ../_terraform-common/commands/init}
  plan: {exec: ../_terraform-common/commands/plan}
  up: {exec: ../_terraform-common/commands/up}
  down: {exec: ../_terraform-common/commands/down}
  start: {exec: commands/start}
  stop: {exec: commands/stop}
  status: {exec: commands/status}
  ip: {exec: commands/ip}
  ssh: {exec: ../_common/commands/ssh}
  login: {exec: commands/login}
  tf-env: {exec: commands/tf-env}
  validate: {exec: ../_common/commands/validate-os, args: [any, AWS image selector, aws_ami_name_pattern, aws_ami_id, aws_ssm_parameter]}
actions:
  - id: status-details
    label: Status
    target: provider.status
  - id: plan
    label: Plan
    target: provider.plan
  - id: init
    label: Init
    target: provider.init
  - id: login
    label: AWS Login
    target: provider.login
    interactive: true
access:
  ubuntu:
    bootstrap_user: {env: VM_USER_NAME}
    provision_user: {env: VM_USER_NAME}
    human_user: {env: VM_USER_NAME, fallback: provision_user}
  windows:
    bootstrap_user: {value: Administrator}
    provision_user: {value: Administrator}
    human_user: {value: Administrator}
capabilities: [login]
config_schema:
  config:
    config_file:
      type: path
      default: "~/.aws/config"
      description: "Path to the AWS CLI config file (profiles/SSO) used by Terraform. Default: ~/.aws/config. Leave unset to use that default."
    profile:
      type: string
      description: "AWS CLI/SSO profile name used by Terraform and the AWS Login action. If unset, the default profile / ambient AWS environment is used. Example: my-sso-profile."
    region:
      type: string
      default: "us-east-1"
      description: "AWS region for all AWS resources. Required. Example: ap-northeast-1 (Tokyo), eu-central-1 (Frankfurt), us-east-1 (default). An instance's location may map to its own region."
    shared_credentials_file:
      type: path
      default: "~/.aws/credentials"
      description: "Path to the AWS CLI credentials file used by Terraform. Default: ~/.aws/credentials. Leave unset to use that default."
  secrets:
    access_key_id:
      type: string
      description: "Static AWS access key ID (AWS_ACCESS_KEY_ID). OPTIONAL — leave unset to authenticate via your profile / SSO / environment / instance role (recommended). Set only for static-key auth; if set it overrides the profile. Example: AKIA..."
    secret_access_key:
      type: string
      description: "Static AWS secret access key (AWS_SECRET_ACCESS_KEY). OPTIONAL — required only if access_key_id is set; otherwise leave unset to use your profile / SSO. Treat as a secret."
supports:
  engines: [terraform]
  kinds: [vm]
env: [AWS_CONFIG_FILE, AWS_PROFILE, AWS_REGION, AWS_SHARED_CREDENTIALS_FILE]
catalog:
  machines:
    - name: aws-cheap-x86
      provider: aws
      kind: vm
      supports:
        arches: [amd64]
      defaults:
        instance_type: t3.large
        disk_gb: 80
        root_volume_type: gp3
        use_spot: false

    - name: aws-gpu-g4dn-spot # 4 vCPUs, 16 GiB RAM, 125 GB NVMe, 1 NVIDIA T4 GPU (16 GB VRAM), spot
      provider: aws
      kind: vm
      supports:
        arches: [amd64]
      defaults:
        instance_type: g4dn.xlarge
        disk_gb: 180
        root_volume_type: gp3
        use_spot: true

    - name: aws-gpu-g5
      provider: aws
      kind: vm
      supports:
        arches: [amd64]
      defaults:
        instance_type: g5.2xlarge
        disk_gb: 200
        use_spot: false
  oses:
    - id: ubuntu-26.04-amd64
      aws_ami_name_pattern: ubuntu/images/hvm-ssd-gp3/ubuntu-resolute-26.04-amd64-server-*

    - id: windows-server-2025
      aws_ami_name_pattern: Windows_Server-2025-English-Full-Base-*
