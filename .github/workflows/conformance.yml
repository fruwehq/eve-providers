name: Conformance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  plugin-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # eve is not published to PyPI yet — clone the repo for its conformance
      # harness + schema. Once eve ships, replace this step with `pip install eve`
      # and the loop below with `eve plugin test <dir>` per provider.
      - uses: actions/checkout@v4
        with:
          repository: fruwehq/eve
          path: eve

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install jsonschema pyyaml

      # Run the conformance harness against every provider plugin in this repo.
      # Provider plugins live one level below the repo root (local-qemu, aws, gcp,
      # vultr, truenas, raspberry-pi) and each carry an eve-plugin.yaml. The
      # shared dispatchers _common and _terraform-common have no eve-plugin.yaml of
      # their own (referenced by providers via relative `../_common/...` exec
      # paths) and are skipped by the `-f .../eve-plugin.yaml` guard.
      - name: plugin-test all providers
        run: |
          for d in */; do
            d="${d%/}"
            [ -f "$d/eve-plugin.yaml" ] || continue
            eve/scripts/plugin-test "$d"
          done
