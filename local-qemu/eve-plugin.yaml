api_version: eve.plugin/v1
kind: provider
id: local-qemu
display_name: Local QEMU
commands:
  resolve: {exec: commands/local-qemu, args: [resolve]}
  init: {exec: commands/init}
  plan: {exec: commands/local-qemu, args: [plan]}
  up: {exec: commands/local-qemu, args: [up]}
  down: {exec: commands/local-qemu, args: [down]}
  start: {exec: commands/local-qemu, args: [start]}
  stop: {exec: commands/local-qemu, args: [stop]}
  status: {exec: commands/local-qemu, args: [status]}
  ip: {exec: commands/local-qemu, args: [ip]}
  ssh: {exec: commands/local-qemu, args: [ssh]}
  validate: {exec: ../_common/commands/validate-os, args: [all, cloud image URL, cloud_image_url]}
actions:
  - id: status-details
    label: Status
    target: provider.status
  - id: plan
    label: Plan
    target: provider.plan
  - id: init
    label: Init
    target: provider.init
access:
  ubuntu:
    bootstrap_user: {env: VM_USER_NAME, value: ubuntu}
    provision_user: {env: VM_USER_NAME, value: ubuntu}
    human_user: {env: VM_USER_NAME, fallback: provision_user}
config_schema:
  config:
    show_console:
      type: boolean
      description: "Set to true to open the hypervisor console window."
supports:
  engines: [qemu]
  kinds: [vm]
env: []
catalog:
  machines:
    - name: local-qemu-medium
      provider: local-qemu
      kind: vm
      supports:
        arches: [arm64]
      defaults:
        cpus: 2
        memory_mb: 4096
        # QEMU/cloud-image boxes start with a small root disk. The full local dev
        # desktop smoke stack may need more room via an explicit override, but the
        # default should stay small enough that local experiments are cheap.
        disk_gb: 20
  oses:
    - id: ubuntu-26.04-amd64
      vagrant_box: cloud-image/ubuntu-26.04
      cloud_image_url: https://cloud-images.ubuntu.com/releases/26.04/release/ubuntu-26.04-server-cloudimg-amd64.img

    - id: ubuntu-26.04-arm64
      cloud_image_url: https://cloud-images.ubuntu.com/releases/26.04/release/ubuntu-26.04-server-cloudimg-arm64.img
      cloud_image_sha256: 5e091e27d60116efbb0c743b8dd5cb2d15618e414ef04db0817ed43c8e2d7c7b
