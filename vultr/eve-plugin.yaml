api_version: eve.plugin/v1
kind: provider
id: vultr
display_name: Vultr
commands:
  resolve: {exec: commands/provider-command, args: [resolve]}
  init: {exec: ../_terraform-common/commands/init}
  plan: {exec: ../_terraform-common/commands/plan}
  up: {exec: ../_terraform-common/commands/up}
  down: {exec: ../_terraform-common/commands/down}
  start: {exec: commands/start}
  stop: {exec: commands/stop}
  status: {exec: commands/status}
  ip: {exec: commands/ip}
  ssh: {exec: ../_common/commands/ssh}
  tf-env: {exec: commands/tf-env}
  validate: {exec: ../_common/commands/validate-os, args: [all, Vultr OS id, vultr_os_id]}
actions:
  - id: status-details
    label: Status
    target: provider.status
  - id: plan
    label: Plan
    target: provider.plan
  - id: init
    label: Init
    target: provider.init
access:
  ubuntu:
    bootstrap_user: {env: VM_USER_NAME}
    provision_user: {env: VM_USER_NAME}
    human_user: {env: VM_USER_NAME, fallback: provision_user}
  windows:
    bootstrap_user: {value: Administrator}
    provision_user: {value: Administrator}
    human_user: {value: Administrator}
capabilities: [password]
config_schema:
  secrets:
    api_key:
      type: string
      required: true
      description: "Vultr API key used by Terraform/Terramate."
      env_var: VULTR_API_KEY
supports:
  engines: [terraform]
  kinds: [vm]
env: [VULTR_API_KEY]
catalog:
  machines:
    - name: vultr-vcg-a40-1c # 1 vCPU, 5 GB RAM, 90 GB NVMe, 3 TB/mo, $0.075/hr, 1/24 NVIDIA A40 (2 GB VRAM)
      provider: vultr
      kind: vm
      supports:
        arches: [amd64]
      defaults:
        plan: vcg-a40-1c-5g-2vram

    - name: vultr-vcg-a40-2c # 2 vCPUs, 10 GB RAM, 180 GB NVMe, 4 TB/mo, $0.144/hr, 1/12 NVIDIA A40 (4 GB VRAM)
      provider: vultr
      kind: vm
      supports:
        arches: [amd64]
      defaults:
        plan: vcg-a40-2c-10g-4vram

    - name: vultr-vcg-a40-4c # 4 vCPUs, 20 GB RAM, 360 GB NVMe, 5 TB/mo, $0.288/hr, 1/6 NVIDIA A40 (8 GB VRAM)
      provider: vultr
      kind: vm
      supports:
        arches: [amd64]
      defaults:
        plan: vcg-a40-4c-20g-8vram

    - name: vultr-vcg-a40-6c # 6 vCPUs, 30 GB RAM, 550 GB NVMe, 6 TB/mo, $0.432/hr, 1/4 NVIDIA A40 (12 GB VRAM)
      provider: vultr
      kind: vm
      supports:
        arches: [amd64]
      defaults:
        plan: vcg-a40-6c-30g-12vram
  oses:
    - id: windows-server-2025
      vultr_os_id: 2514 # Windows 2025 Standard x64
