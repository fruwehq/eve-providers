api_version: eve.plugin/v1
kind: provider
id: raspberry-pi
display_name: Raspberry Pi Metal
commands:
  resolve: {exec: commands/provider-command, args: [resolve]}
  init: {exec: commands/init}
  plan: {exec: commands/plan}
  up: {exec: commands/up}
  down: {exec: commands/down}
  start: {exec: commands/start}
  stop: {exec: commands/stop}
  status: {exec: commands/status}
  ip: {exec: commands/ip}
  ssh: {exec: commands/ssh}
  validate: {exec: ../_common/commands/validate-os, args: [all, metal image, metal_image]}
actions:
  - id: status-details
    label: Status
    target: provider.status
  - id: plan
    label: Plan
    target: provider.plan
  - id: init
    label: Init
    target: provider.init
access:
  ubuntu:
    bootstrap_user: {env: VM_USER_NAME}
    provision_user: {env: VM_USER_NAME}
    human_user: {env: VM_USER_NAME, fallback: provision_user}
capabilities: [needs-provider-ip]
config_schema:
  config:
    hdmi_connector:
      type: enum
      enum: [HDMI-A-1, HDMI-A-2]
      env_var: RASPBERRY_PI_HDMI_CONNECTOR
      description: "Raspberry Pi HDMI connector name."
    hdmi_mode:
      type: string
      env_var: RASPBERRY_PI_HDMI_MODE
      description: "Raspberry Pi HDMI mode override."
    host:
      type: host
      env_var: RASPBERRY_PI_HOST
      description: "Raspberry Pi host name used for IP discovery."
    ip:
      type: string
      env_var: RASPBERRY_PI_IP
      description: "Raspberry Pi fixed IP override."
  secrets:
    user_password:
      type: string
      description: "Raspberry Pi user's login password for bootstrap."
bootstrap:
  # Core reads this env var generically to install NOPASSWD sudo on first
  # contact when the SSH user lacks it — core names no provider.
  sudo_password_env: RASPBERRY_PI_USER_PASSWORD
supports:
  engines: [metal]
  kinds: [metal]
env: [RASPBERRY_PI_HDMI_CONNECTOR, RASPBERRY_PI_HDMI_MODE, RASPBERRY_PI_HOST, RASPBERRY_PI_IP, RASPBERRY_PI_USER_PASSWORD, VM_USER_NAME]
env_emission:
  - name: RASPBERRY_PI_HOST
    from:
      - provider_config.host
      - provider_config.ip
      - env:RASPBERRY_PI_HOST
      - location.host
    default: ""
  - name: RASPBERRY_PI_IP
    from:
      - provider_config.ip
      - env:RASPBERRY_PI_IP
      - location.ip
    default: ""
catalog:
  machines:
    - name: raspberry-pi-5
      provider: raspberry-pi
      kind: metal
      supports:
        arches: [arm64]
      defaults:
        # CPU / memory / disk are physical attributes of the Pi, not knobs this
        # repo can set. Only architecture is recorded so provisioning can pick
        # arm64 binaries.
        architecture: arm64
  oses:
    - id: ubuntu-26.04-arm64
      metal_image: ubuntu-26.04-arm64
  locations:
    - name: tokyo
      raspberry-pi:
        ssh_port: 22
